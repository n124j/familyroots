# Production override — pull images from registry, no volume mounts
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required env vars (set in .env.prod or CI secrets):
#   IMAGE_TAG, DB_PASSWORD, REDIS_PASSWORD, JWT_SECRET,
#   S3_BUCKET, S3_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   SENTRY_DSN, CORS_ORIGINS

name: familyroots-prod

x-image-base: &image-base
  image: ghcr.io/your-org/familyroots

x-backend-env: &backend-env
  DATABASE_URL:            ${DATABASE_URL}
  SYNC_DATABASE_URL:       ${SYNC_DATABASE_URL}
  REDIS_URL:               redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_BROKER_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_RESULT_BACKEND:   redis://:${REDIS_PASSWORD}@redis:6379/1
  JWT_SECRET:              ${JWT_SECRET}
  ENVIRONMENT:             production
  S3_BUCKET:               ${S3_BUCKET}
  S3_REGION:               ${S3_REGION}
  AWS_ACCESS_KEY_ID:       ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY:   ${AWS_SECRET_ACCESS_KEY}
  CORS_ORIGINS:            ${CORS_ORIGINS}
  SENTRY_DSN:              ${SENTRY_DSN}
  LOG_LEVEL:               INFO
  LOG_FORMAT:              json

x-restart: &restart
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  redis:
    image: redis:7-alpine
    <<: *restart
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    <<: [*image-base, *restart]
    image: ghcr.io/your-org/familyroots/api:${IMAGE_TAG}
    environment: *backend-env
    deploy:
      replicas: 3
      resources:
        limits:   { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    <<: *restart
    image: ghcr.io/your-org/familyroots/worker:${IMAGE_TAG}
    environment: *backend-env
    command: >
      celery -A src.infrastructure.media.celery_app worker
        --loglevel=info
        --queues=media,default
        --concurrency=4
        --max-tasks-per-child=50
    deploy:
      replicas: 2
      resources:
        limits:   { cpus: "2.0", memory: 1G }
        reservations: { cpus: "0.5", memory: 512M }

  frontend:
    <<: *restart
    image: ghcr.io/your-org/familyroots/frontend:${IMAGE_TAG}
    ports:
      - "7013:8080"
    deploy:
      replicas: 2
      resources:
        limits:   { cpus: "0.25", memory: 64M }
        reservations: { cpus: "0.05", memory: 32M }

volumes:
  redis_data:
